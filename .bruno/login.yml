info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{endpoint}}/api/login"
  body:
    type: json
    data: |-
      {
        "username": "username",
        "password": "password"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
